{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4"><i class="bi bi-speedometer2"></i> Dashboard</h1>

<div class="row g-4">

    <div class="col-md-4">
        <div class="card text-bg-primary shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="card-subtitle mb-2 text-white-50">Produtos</h6>
                    <h2 class="card-title fw-bold mb-0">{{ total_produtos }}</h2>
                </div>
                <i class="bi bi-box-seam display-4 opacity-50"></i>
            </div>
            <a href="{{ url_for('web.listar_produtos_view') }}" class="card-footer text-white text-decoration-none">
                Ver produtos <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-bg-success shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="card-subtitle mb-2 text-white-50">Categorias</h6>
                    <h2 class="card-title fw-bold mb-0">{{ total_categorias }}</h2>
                </div>
                <i class="bi bi-tags display-4 opacity-50"></i>
            </div>
            <a href="{{ url_for('web.listar_categorias_view') }}" class="card-footer text-white text-decoration-none">
                Ver categorias <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-bg-dark shadow-sm h-100">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="card-subtitle mb-2 text-white-50">Usuários</h6>
                    <h2 class="card-title fw-bold mb-0">{{ total_usuarios }}</h2>
                </div>
                <i class="bi bi-people display-4 opacity-50"></i>
            </div>
            <a href="{{ url_for('web.listar_usuarios_view') }}" class="card-footer text-white text-decoration-none">
                Ver usuários <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>

</div>
{% endblock %}
